<script>
'use strict';
var App = App || {};

// #38: Timeout constants with readable expressions
App.TIMEOUTS = {
  analizarConGeminiFresco: 3 * 60 * 1000,  // 3 min
  getDashboardCartera: 60 * 1000,          // 1 min
  getCartera: 45 * 1000,                   // 45s
};
App.DEFAULT_TIMEOUT = 30 * 1000;           // 30s

// #36: Namespaced global state
App.state = {
  cartera: { pageToken: 0, pageSize: 100 },
  pagos: { compraId: null },
  compras: { list: [] },
  productos: { cache: [], lastFetch: 0 },
};

function callServer(funcName) {
  var args = Array.prototype.slice.call(arguments, 1);
  var timeoutMs = App.TIMEOUTS[funcName] || App.DEFAULT_TIMEOUT;

  return new Promise(function (resolve, reject) {
    var timer = setTimeout(function () {
      var errorMsg = 'El servidor tard\u00f3 demasiado en responder para la operaci\u00f3n: ' + funcName + ' (L\u00edmite: ' + (timeoutMs / 1000) + 's).';
      App.logError(errorMsg, funcName);
      reject({ code: 'TIMEOUT', message: errorMsg, funcName: funcName });
    }, timeoutMs);

    google.script.run
      .withSuccessHandler(function (result) {
        clearTimeout(timer);
        if (result && result.suggestedTimeout && result.suggestedTimeout > App.DEFAULT_TIMEOUT) {
          App.TIMEOUTS[funcName] = result.suggestedTimeout;
        }
        resolve(result);
      })
      .withFailureHandler(function (error) {
        clearTimeout(timer);
        var errMsg = (error && error.message) ? error.message : String(error || 'Error desconocido');
        var errCode = (error && error.code) ? error.code : 'SERVER_ERROR';
        App.logError(errMsg, funcName);
        reject({ code: errCode, message: errMsg, funcName: funcName, raw: error });
      })
      [funcName].apply(null, args);
  });
}

App.api = {
  getDashboard: function () { return callServer('getDashboardCartera'); },
  getCartera: function (filtroTipo, filtroEstado, pageSize, pageToken) { return callServer('getCartera', filtroTipo, filtroEstado, pageSize, pageToken); },
  getCarteraDebug: function (filtroTipo, filtroEstado) { return callServer('getCarteraDebug', filtroTipo, filtroEstado); },
  getTerceros: function (filtroTipo) { return callServer('getTerceros', filtroTipo); },
  registrarAbono: function (idTercero, valorAbono, referencia, tipo) { return callServer('registrarAbono', idTercero, valorAbono, referencia, tipo); },
  saveTercero: function (tercero) { return callServer('saveTercero', tercero); },
  analizarConGeminiFresco: function () { return callServer('analizarConGeminiFresco'); },
  getAuditHistory: function (tabla, idRegistro, limit) { return callServer('getAuditHistory', tabla, idRegistro, limit); },
  getUserInfo: function () { return callServer('getUserInfo'); },
  procesarVenta: function (carrito, opciones) { return callServer('procesarVenta', carrito, opciones); },
  getProductos: function (filtro) { return callServer('getProductos', filtro); },
  crearProducto: function (nombre, precioCompra, precioVenta, categoria) { return callServer('crearProducto', nombre, precioCompra, precioVenta, categoria || ''); },
  actualizarProducto: function (id, cambios) { return callServer('actualizarProducto', id, cambios); },
  getProducto: function (id) { return callServer('getProducto', id); },
  toggleActivoProducto: function (id) { return callServer('toggleActivoProducto', id); },
  registrarCompra: function (proveedorId, items, total, fechaVencimiento, factura) { return callServer('registrarCompra', proveedorId, items, total, fechaVencimiento, factura); },
  getCompras: function (filtroProveedor, filtroEstado) { return callServer('getCompras', filtroProveedor, filtroEstado); },
  getDetalleCompra: function (idCompra) { return callServer('getDetalleCompra', idCompra); },
  registrarPagoProveedor: function (idCompra, monto, referencia) { return callServer('registrarPagoProveedor', idCompra, monto, referencia); },
  getProximosVencimientos: function (dias) { return callServer('getProximosVencimientos', dias); },
  getRankingDeudores: function (topN) { return callServer('getRankingDeudores', topN); },
  getConcentracionProveedores: function () { return callServer('getConcentracionProveedores'); },
  getFlujoCajaResumen: function (dias) { return callServer('getFlujoCajaResumen', dias); },
  exportarLibroDiario: function (fechaInicio, fechaFin) { return callServer('exportarLibroDiario', fechaInicio, fechaFin); },
  exportarFlujoCaja: function (fechaInicio, fechaFin) { return callServer('exportarFlujoCaja', fechaInicio, fechaFin); },
  getCacheHealth: function () { return callServer('getCacheHealth'); },
  getCacheMetrics: function () { return callServer('getCacheMetrics'); },
  verificarConfiguracionIA: function () { return callServer('verificarConfiguracionIA'); },
  getVentasDelDia: function () { return callServer('getVentasDelDia'); },
  getKardexProducto: function (idProducto, limit) { return callServer('getKardexProducto', idProducto, limit); },
  getKardex: function (limit) { return callServer('getKardex', limit); },
};

// #43: Adapter layer — normalizes backend responses with defaults
App.adapters = {
  dashboard: function (raw) {
    if (!raw || raw.success === false) return { error: raw ? (raw.error || raw.message || 'Error desconocido') : 'Sin respuesta', porCobrar: 0, porPagar: 0, vencidaCxC: 0, vencidaCxP: 0, alertas: [] };
    return {
      porCobrar: Number(raw.porCobrar) || 0,
      porPagar: Number(raw.porPagar) || 0,
      vencidaCxC: Number(raw.vencidaCxC) || 0,
      vencidaCxP: Number(raw.vencidaCxP) || 0,
      alertas: Array.isArray(raw.alertas) ? raw.alertas.map(function (a) { return { id_tercero: a.id_tercero || '', nombre: a.nombre || '\u2014', saldo: Number(a.saldo) || 0, dias: Number(a.dias) || 0 }; }) : [],
      proximosVencimientos7: raw.proximosVencimientos7,
      proximosVencimientos15: raw.proximosVencimientos15,
      proximosVencimientos30: raw.proximosVencimientos30,
      topDeudores: Array.isArray(raw.topDeudores) ? raw.topDeudores.map(function (d) { return { nombre: d.nombre || '\u2014', saldo_vencido: Number(d.saldo_vencido) || 0, max_dias: Number(d.max_dias) || 0 }; }) : [],
      concentracionProveedores: raw.concentracionProveedores ? { items: Array.isArray(raw.concentracionProveedores.items) ? raw.concentracionProveedores.items : [], total: Number(raw.concentracionProveedores.total) || 0 } : null,
      correlationId: raw.correlationId || '',
      executionTimeMs: raw.executionTimeMs || 0,
      generatedAt: raw.generatedAt || '',
      cacheHit: !!raw.cacheHit,
    };
  },
  cartera: function (raw) {
    if (!raw || raw.success === false) return { error: raw ? (raw.error || raw.message || 'Error desconocido') : 'Sin respuesta', items: [], nextPageToken: null };
    var items = Array.isArray(raw.items) ? raw.items.map(function (item) {
      return {
        id: item.id || '',
        rowIndex: item.rowIndex || 0,
        fecha: item.fecha || null,
        id_tercero: item.id_tercero || '',
        origen_id: item.origen_id || '',
        total: Number(item.total) || 0,
        saldo: Number(item.saldo) || 0,
        tipo: item.tipo || '',
        estado: item.estado || '',
        fecha_vencimiento: item.fecha_vencimiento || null,
        version: Number(item.version) || 0,
        nombre_tercero: item.nombre_tercero || '\u2014',
        dias_vencido: Number(item.dias_vencido) || 0,
      };
    }) : [];
    return {
      items: items,
      nextPageToken: raw.nextPageToken != null ? raw.nextPageToken : null,
      correlationId: raw.correlationId || '',
      executionTimeMs: raw.executionTimeMs || 0,
      generatedAt: raw.generatedAt || '',
      cacheHit: !!raw.cacheHit,
    };
  },
  terceros: function (raw) {
    if (!raw || raw.success === false) return { error: raw ? (raw.error || raw.message || 'Error desconocido') : 'Sin respuesta', items: [] };
    var rawItems = Array.isArray(raw) ? raw : (Array.isArray(raw.items) ? raw.items : []);
    return {
      items: rawItems.map(function (t) {
        return {
          id: t.id || '',
          nombre: t.nombre || '\u2014',
          telefono: t.telefono || '',
          tipo: t.tipo || '',
          limite_credito: Number(t.limite_credito) || 0,
          activo: t.activo !== false,
        };
      }),
      correlationId: raw.correlationId || '',
      executionTimeMs: raw.executionTimeMs || 0,
      generatedAt: raw.generatedAt || '',
      cacheHit: !!raw.cacheHit,
    };
  },
  productos: function (raw) {
    if (!raw || raw.success === false) return { error: raw ? (raw.error || raw.message || 'Error desconocido') : 'Sin respuesta', productos: [] };
    var list = Array.isArray(raw.productos) ? raw.productos : (Array.isArray(raw) ? raw : []);
    return {
      productos: list.map(function (p) {
        return {
          id: p.id || '',
          nombre: p.nombre || '\u2014',
          stock: Number(p.stock) || 0,
          precio_compra: Number(p.precio_compra) || 0,
          precio_venta: Number(p.precio_venta) || 0,
          categoria: p.categoria || '',
          activo: p.activo || 'ACTIVO',
        };
      }),
      correlationId: raw.correlationId || '',
      executionTimeMs: raw.executionTimeMs || 0,
      generatedAt: raw.generatedAt || '',
      cacheHit: !!raw.cacheHit,
    };
  },
  compras: function (raw) {
    if (!raw || raw.success === false) return { error: raw ? (raw.error || raw.message || 'Error desconocido') : 'Sin respuesta', items: [] };
    return {
      items: Array.isArray(raw.items) ? raw.items.map(function (c) {
        return {
          id: c.id || '',
          fecha: c.fecha || null,
          id_proveedor: c.id_proveedor || '',
          id_factura: c.id_factura || '',
          total: Number(c.total) || 0,
          saldo: Number(c.saldo) || 0,
          pagado: Number(c.pagado) || 0,
          estado: c.estado || 'PENDIENTE',
          fecha_vencimiento: c.fecha_vencimiento || null,
          nombre_proveedor: c.nombre_proveedor || '\u2014',
        };
      }) : [],
      total: Number(raw.total) || 0,
      page: Number(raw.page) || 0,
      pageSize: Number(raw.pageSize) || 0,
      correlationId: raw.correlationId || '',
      executionTimeMs: raw.executionTimeMs || 0,
      generatedAt: raw.generatedAt || '',
      cacheHit: !!raw.cacheHit,
    };
  },
  ventaResult: function (raw) {
    if (!raw || raw.success === false) return { error: raw ? (raw.error || raw.message || 'Error al procesar venta') : 'Sin respuesta', success: false };
    return {
      success: true,
      total: Number(raw.total) || 0,
      tipo: raw.tipo || 'CONTADO',
      idTercero: raw.idTercero || null,
      state: raw.state || { transitions: [], durationMs: 0 },
      correlationId: raw.correlationId || '',
      executionTimeMs: raw.executionTimeMs || 0,
    };
  },
};

App.formatearMoneda = function (centavos) {
  if (centavos == null || isNaN(centavos)) return '$0';
  return (centavos / 100).toLocaleString('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 });
};

App.toCents = function (amount) {
  var num = Number(amount);
  if (isNaN(num) || num < 0) return 0;
  if (num % 1 !== 0) {
    console.warn('toCents: valor con decimales convertido: ' + amount + ' -> ' + Math.round(num * 100) + ' centavos. Evite usar decimales.');
  }
  if (num > 9007199254740991) { return 0; }
  return Math.round(num * 100);
};

App.formatearFecha = function (dateObj) {
  if (!dateObj) return '\u2014';
  var d = dateObj instanceof Date ? dateObj : new Date(dateObj);
  if (isNaN(d.getTime())) return '\u2014';
  var meses = ['ene.', 'feb.', 'mar.', 'abr.', 'may.', 'jun.', 'jul.', 'ago.', 'sep.', 'oct.', 'nov.', 'dic.'];
  return d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();
};

App.mapearEstadoCartera = function (estado) {
  var map = { VENCIDA: { label: 'Vencida', cls: 'badge-venc' }, ABIERTA: { label: 'Abierta', cls: 'badge-open' }, PARCIAL: { label: 'Parcial', cls: 'badge-partial' }, CANCELADA: { label: 'Cancelada', cls: 'badge-done' } };
  return map[estado] || { label: estado || '\u2014', cls: 'badge-done' };
};

/**
 * Mostrar respuesta del servidor para diagnóstico
 */
function mostrarRespuestaServidor(res, container) {
  container.innerHTML = '';
  var pre = document.createElement('pre');
  pre.style.cssText = 'font-size:var(--text-xs);color:var(--text);padding:var(--space-3);background:var(--bg-2);overflow:auto;max-height:400px;';
  pre.textContent = JSON.stringify(res, null, 2);
  container.appendChild(pre);
}

App.mapearTipoTercero = function (tipo) {
  var map = { CLIENTE: { label: 'Cliente', cls: 'badge-open' }, PROVEEDOR: { label: 'Proveedor', cls: '' }, AMBOS: { label: 'Ambos', cls: 'badge-open' } };
  return map[tipo] || { label: tipo || '\u2014', cls: 'badge-done' };
};

function mostrarLoader(contenedor) {
  contenedor.innerHTML = '';
  var div = document.createElement('div');
  div.className = 'loader-brutal';
  div.textContent = 'Cargando';
  div.setAttribute('role', 'status');
  div.setAttribute('aria-live', 'polite');
  contenedor.appendChild(div);
}

function mostrarError(contenedor, mensaje) {
  contenedor.innerHTML = '';
  var div = document.createElement('div');
  div.className = 'error-banner show';
  div.textContent = mensaje;
  contenedor.appendChild(div);
}

function mostrarVacio(contenedor, mensaje) {
  contenedor.innerHTML = '';
  var div = document.createElement('div');
  div.className = 'empty-state';
  div.textContent = mensaje;
  contenedor.appendChild(div);
}

// #47: Client-side validation layer (mirrors backend INPUT_VALIDATOR)
App.validate = {
  required: function (value, fieldName) { if (!value || !value.toString().trim()) return 'El campo ' + fieldName + ' es obligatorio.'; return ''; },
  nit: function (value) { if (!value || !value.toString().trim()) return 'El NIT es obligatorio.'; if (!/^[\d-]+$/.test(value.toString().trim())) return 'El NIT solo puede contener d\u00edgitos y guiones.'; return ''; },
  moneda: function (value, fieldName) { var n = Number(value); if (isNaN(n) || n < 0) return 'El campo ' + fieldName + ' debe ser un valor v\u00e1lido mayor o igual a 0.'; return ''; },
  select: function (value, fieldName) { if (!value) return 'Seleccione un ' + fieldName + '.'; return ''; },
  referencia: function (value) { if (!value || !value.toString().trim()) return 'La referencia es obligatoria.'; return ''; },
  all: function (rules) {
    for (var i = 0; i < rules.length; i++) {
      var err = rules[i].fn(rules[i].value, rules[i].label);
      if (err) return err;
    }
    return '';
  },
};

// #46: Frontend cache with ultra-short TTL (backend has longer TTL)
App.data = (function () {
  var CACHE_TTL = { dashboard: 30 * 1000, cartera: 20 * 1000, terceros: 30 * 1000 };
  var _store = { dashboard: null, cartera: null, terceros: null };
  var _timestamps = { dashboard: 0, cartera: 0, terceros: 0 };
  var _deps = { cartera: ['dashboard'], dashboard: [], terceros: [] };

  function _isStale(key) {
    return !_store[key] || (Date.now() - _timestamps[key] > CACHE_TTL[key]);
  }

  function _invalidate(key) {
    _store[key] = null;
    _timestamps[key] = 0;
    (_deps[key] || []).forEach(function (dep) { _store[dep] = null; _timestamps[dep] = 0; });
  }

  return {
    get dashboard() { return _isStale('dashboard') ? null : _store.dashboard; },
    set dashboard(v) { _store.dashboard = v; _timestamps.dashboard = Date.now(); },
    get cartera() { return _isStale('cartera') ? null : _store.cartera; },
    set cartera(v) { _store.cartera = v; _timestamps.cartera = Date.now(); },
    get terceros() { return _isStale('terceros') ? null : _store.terceros; },
    set terceros(v) { _store.terceros = v; _timestamps.terceros = Date.now(); },
    invalidate: function (key) {
      if (key) { _invalidate(key); return; }
      _store.dashboard = null; _timestamps.dashboard = 0;
      _store.cartera = null; _timestamps.cartera = 0;
      _store.terceros = null; _timestamps.terceros = 0;
    },
    // #46: refresh methods apply adapters before caching
    refreshDashboard: function () {
      var self = this;
      return App.api.getDashboard().then(function (d) {
        var adapted = App.adapters.dashboard(d);
        if (!adapted.error) self.dashboard = adapted;
        return adapted;
      });
    },
    refreshCartera: function (filtroTipo, filtroEstado) {
      var self = this;
      return App.api.getCartera(filtroTipo, filtroEstado).then(function (d) {
        var adapted = App.adapters.cartera(d);
        if (!adapted.error) self.cartera = adapted;
        return adapted;
      });
    },
    refreshTerceros: function (filtroTipo) {
      var self = this;
      return App.api.getTerceros(filtroTipo).then(function (d) {
        var adapted = App.adapters.terceros(d);
        if (!adapted.error) self.terceros = adapted;
        return adapted;
      });
    },
  };
})();

function escapeHtml(str) {
  if (typeof DOMPurify !== 'undefined' && DOMPurify.sanitize) {
    return DOMPurify.sanitize(String(str), {ALLOWED_TAGS: []});
  }
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function escapeAttr(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Hierarchy of error types for differentiated feedback
var ERROR_TYPES = { NETWORK: 'network', VALIDATION: 'validation', SERVER: 'server' };

function showError(msg, type) {
  type = type || ERROR_TYPES.SERVER;
  var banner = document.getElementById('error-banner');
  var icons = { network: '⚠', validation: '✕', server: '⛔' };
  var actions = {
    network: 'Verifique su conexión y reintente',
    validation: 'Corrija los campos marcados',
    server: 'Contacte soporte si persiste (Ref: ' + Date.now() + ')'
  };
  if (banner) {
    banner.innerHTML = '<span class="error-icon">' + icons[type] + '</span>' + msg + '<small>' + actions[type] + '</small>';
    banner.classList.add('show', 'type-' + type);
  } else {
    showToast(msg, type);
  }
}

function showToast(msg, type) {
  type = type || ERROR_TYPES.SERVER;
  var container = document.getElementById('toast-container');
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  var icons = { network: '⚠', validation: '✕', server: '⛔' };
  el.innerHTML = '<span>' + msg + '</span><button class="toast-close" aria-label="Cerrar">×</button>';
  if (type === 'error' || type === ERROR_TYPES.SERVER) el.setAttribute('role', 'alert');
  container.appendChild(el);
  el.querySelector('.toast-close').addEventListener('click', function() {
    el.style.animation = 'toast-out .3s ease forwards';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  });
  setTimeout(function () {
    el.style.animation = 'toast-out .3s ease forwards';
    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, 5000);
}

App.logError = function (message, context) {
  var tag = '[' + (context || 'App') + '] ' + (message || 'Error desconocido');
  console.error(tag);
  try { showToast(context ? message : 'Error: ' + message, 'error'); } catch (e) {}
};

function generarIdTemporal() {
  return 'TMP-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
}
</script>
