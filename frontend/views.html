// 1. DASHBOARD
// Helper: removes loading overlay from a view
function _cleanupView(view) {
  view.classList.remove('is-loading');
  view.removeAttribute('aria-busy');
}

// Helper: renders alert rows into container
function _renderAlertas(container, alertas) {
  container.innerHTML = '';
  if (alertas.length === 0) {
    mostrarVacio(container, 'Sin alertas');
    return;
  }
  alertas.forEach(function (a, i) {
    var row = document.createElement('div');
    row.className = 'alert-row' + (i === 0 ? ' critical' : '');
    var rankDiv = document.createElement('div');
    rankDiv.className = 'rank' + (i === 0 ? ' top' : '');
    rankDiv.textContent = '#' + (i + 1);
    row.appendChild(rankDiv);
    var infoDiv = document.createElement('div');
    var nameDiv = document.createElement('div');
    nameDiv.className = 'alert-name';
    nameDiv.textContent = a.nombre || '\u2014';
    var idDiv = document.createElement('div');
    idDiv.className = 'alert-id';
    idDiv.textContent = a.id_tercero || '';
    infoDiv.appendChild(nameDiv);
    infoDiv.appendChild(idDiv);
    row.appendChild(infoDiv);
    var rightDiv = document.createElement('div');
    rightDiv.className = 'alert-right';
    var amountDiv = document.createElement('div');
    amountDiv.className = 'alert-amount';
    amountDiv.textContent = App.formatearMoneda(a.saldo);
    var diasDiv = document.createElement('div');
    diasDiv.className = 'alert-dias';
    diasDiv.textContent = (a.dias || 0) + ' d' + (a.dias === 1 ? '\u00eda' : '\u00edas');
    rightDiv.appendChild(amountDiv);
    rightDiv.appendChild(diasDiv);
    row.appendChild(rightDiv);
    container.appendChild(row);
  });
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

function cargarDashboard() {
  var view = document.getElementById('view-dashboard');
  view.classList.add('is-loading');
  view.setAttribute('aria-busy', 'true');
  var alertsBody = document.getElementById('alerts-body');
  mostrarLoader(alertsBody);
  var promise = App.data.dashboard ? Promise.resolve(App.data.dashboard) : App.api.getDashboard();
  return promise.then(function (data) {
    if (!App.data.dashboard) App.data.dashboard = data;
    if (data.success === false || data.error) {
      mostrarError(alertsBody, data.error || 'Error al cargar dashboard');
      return;
    }
    document.getElementById('stat-cobrar').textContent = App.formatearMoneda(data.porCobrar);
    document.getElementById('stat-vencido-cxc').textContent = App.formatearMoneda(data.vencidaCxC);
    document.getElementById('stat-pagar').textContent = App.formatearMoneda(data.porPagar);
    document.getElementById('stat-vencido-cxp').textContent = App.formatearMoneda(data.vencidaCxP);
    document.getElementById('stat-exposicion').textContent = App.formatearMoneda(data.porCobrar - data.porPagar);
    if (data.proximosVencimientos7 !== undefined) {
      document.getElementById('stat-prox7').textContent = App.formatearMoneda(data.proximosVencimientos7);
      document.getElementById('stat-prox15').textContent = App.formatearMoneda(data.proximosVencimientos15);
      document.getElementById('stat-prox30').textContent = App.formatearMoneda(data.proximosVencimientos30);
    }
    if (data.topDeudores && data.topDeudores.length > 0) {
      var top = data.topDeudores[0];
      document.getElementById('stat-topdeudor').textContent = top.nombre || '\u2014';
      document.getElementById('stat-topdeudor-meta').textContent = App.formatearMoneda(top.saldo_vencido) + ' (' + (top.max_dias || 0) + 'd)';
    }
    if (data.concentracionProveedores) {
      var c = data.concentracionProveedores;
      document.getElementById('stat-concprov').textContent = (c.items ? c.items.length : 0) + ' prov.';
      document.getElementById('stat-concprov-meta').textContent = c.total ? App.formatearMoneda(c.total) : '\u2014';
    }
    App.api.getFlujoCajaResumen(30).then(function (flujo) {
      if (flujo && flujo.success !== false) {
        document.getElementById('stat-saldo-caja').textContent = App.formatearMoneda(flujo.saldo_actual);
        document.getElementById('stat-flujo-neto').textContent = "30d: " + (flujo.neto >= 0 ? "+" : "") + App.formatearMoneda(flujo.neto);
      }
    }).catch(function () {});
    document.getElementById('alert-count').textContent = data.alertas.length + ' cr' + (data.alertas.length === 1 ? 'tico' : 'ticos');
    _renderAlertas(alertsBody, data.alertas);
  }).catch(function (err) {
    mostrarError(alertsBody, err.message || err);
    showError(err.message || err);
  }).then(function () {
    _cleanupView(view);
  });
}

function crearSeccionIA(labelText) {
  var sec = document.createElement('div');
  sec.className = 'ir-section';
  if (labelText) {
    var lbl = document.createElement('div');
    lbl.className = 'ir-label';
    lbl.textContent = labelText;
    sec.appendChild(lbl);
  }
  return sec;
}

function renderizarAnalisis(analisis) {
  var c = document.getElementById('ia-results');
  c.textContent = '';

  var secResumen = crearSeccionIA('Resumen ejecutivo');
  var valResumen = document.createElement('div');
  valResumen.className = 'ir-value';
  valResumen.textContent = analisis.resumen_ejecutivo || '';
  secResumen.appendChild(valResumen);
  c.appendChild(secResumen);

  var secConfianza = crearSeccionIA(null);
  var badge = document.createElement('div');
  badge.className = 'ir-badge';
  badge.textContent = 'Confianza: ' + (analisis.nivel_confianza_general || 0) + '%';
  secConfianza.appendChild(badge);
  c.appendChild(secConfianza);

  if (analisis.alertas_criticas && analisis.alertas_criticas.length) {
    var secAlertas = crearSeccionIA('Alertas crÃ­ticas');
    analisis.alertas_criticas.forEach(function (a) {
      var item = document.createElement('div');
      item.className = 'ir-alert-item';
      item.textContent = a.titulo || a.mensaje || a.descripcion || '';
      secAlertas.appendChild(item);
    });
    c.appendChild(secAlertas);
  }

  if (analisis.analisis_riesgo_cartera) {
    var r = analisis.analisis_riesgo_cartera;
    var secRiesgo = crearSeccionIA('AnÃ¡lisis de riesgo');
    var grid = document.createElement('div');
    grid.className = 'ir-grid';
    Object.keys(r).forEach(function (k) {
      var gridItem = document.createElement('div');
      gridItem.className = 'ir-grid-item';
      var glabel = document.createElement('div');
      glabel.className = 'ir-glabel';
      glabel.textContent = k.replace(/_/g, ' ');
      var gvalue = document.createElement('div');
      gvalue.className = 'ir-gvalue';
      var val = r[k];
      if (Array.isArray(val)) {
        gvalue.textContent = val.map(function(item) {
          if (typeof item === 'object' && item !== null) {
            return item.nombre || item.id_tercero || JSON.stringify(item);
          }
          return item;
        }).join(', ');
      } else if (typeof val === 'object' && val !== null) {
        gvalue.textContent = Object.values(val).join(', ');
      } else {
        gvalue.textContent = String(val);
      }
      gridItem.appendChild(glabel);
      gridItem.appendChild(gvalue);
      grid.appendChild(gridItem);
    });
    secRiesgo.appendChild(grid);
    c.appendChild(secRiesgo);
  }

  if (analisis.segmentacion_terceros) {
    var s = analisis.segmentacion_terceros;
    var secSeg = crearSeccionIA('SegmentaciÃ³n');
    var gridSeg = document.createElement('div');
    gridSeg.className = 'ir-grid';
    Object.keys(s).forEach(function (k) {
      var gridItem = document.createElement('div');
      gridItem.className = 'ir-grid-item';
      var glabel = document.createElement('div');
      glabel.className = 'ir-glabel';
      glabel.textContent = k.replace(/_/g, ' ');
      var gvalue = document.createElement('div');
      gvalue.className = 'ir-gvalue';
      var val = s[k];
      if (Array.isArray(val)) {
        gvalue.textContent = val.map(function(item) {
          if (typeof item === 'object' && item !== null) {
            return item.nombre || item.id || JSON.stringify(item);
          }
          return item;
        }).join(', ');
      } else if (typeof val === 'object' && val !== null) {
        gvalue.textContent = Object.values(val).join(', ');
      } else {
        gvalue.textContent = String(val);
      }
      gridItem.appendChild(glabel);
      gridItem.appendChild(gvalue);
      gridSeg.appendChild(gridItem);
    });
    secSeg.appendChild(gridSeg);
    c.appendChild(secSeg);
  }

  if (analisis.anomalias_detectadas && analisis.anomalias_detectadas.length) {
    var secAno = crearSeccionIA('AnomalÃ­as detectadas');
    analisis.anomalias_detectadas.forEach(function (a) {
      var item = document.createElement('div');
      item.className = 'ir-ano-item';
      item.textContent = typeof a === 'string' ? a : (a.titulo || a.mensaje || a.descripcion || JSON.stringify(a));
      secAno.appendChild(item);
    });
    c.appendChild(secAno);
  }

  if (analisis.recomendaciones_accionables && analisis.recomendaciones_accionables.length) {
    var secRec = crearSeccionIA('Recomendaciones');
    analisis.recomendaciones_accionables.forEach(function (r) {
      var item = document.createElement('div');
      item.className = 'ir-rec-item';
            if (r.explicacion) {
        var expDiv = document.createElement('small');
        expDiv.className = 'ir-explanation';
        expDiv.innerHTML = '<em>Por qué:</em> ' + r.explicacion;
        item.appendChild(expDiv);
      }
      item.innerHTML = typeof r === 'string' ? r : '<strong>' + (r.titulo || r.mensaje || r.accion || r.descripcion || '') + '</strong>';
      if (r.descripcion && !r.explicacion) {
        var descP = document.createElement('p');
        descP.textContent = r.descripcion;
        item.appendChild(descP);
      }
      secRec.appendChild(item);
    });
    c.appendChild(secRec);
  }

  c.style.display = 'block';
}

function analizarConGeminiFresco() {
  var btnHeader = document.getElementById('btn-analizar-ia');
  var btnPanel = document.getElementById('btn-analizar-completo');
  var results = document.getElementById('ia-results');
  var textoOriginalH = btnHeader.textContent;
  var textoOriginalP = btnPanel.textContent;

  btnHeader.disabled = true;
  btnHeader.textContent = 'â—ˆ Analizando...';
  btnPanel.disabled = true;
  btnPanel.textContent = 'â—ˆ Analizando...';
  results.style.display = 'none';

  var progressBar = document.getElementById('ia-progress');
  var progressBarInner = document.getElementById('ia-progress-bar');
  var progressText = document.getElementById('ia-progress-text');
  progressBar.style.display = 'block';
  progressBarInner.className = 'ia-progress-bar-active';
  progressText.textContent = 'Consultando Gemini 2.5 Flash...';

  App.api.analizarConGeminiFresco()
    .then(function (resp) {
      progressBarInner.className = '';
      progressBarInner.style.width = '100%';
      setTimeout(function(){ progressBar.style.display = 'none'; }, 500);
      if (resp && resp.success && resp.analisis) {
        renderizarAnalisis(resp.analisis);
      } else {
        var errorMsg = (resp && resp.error) ? resp.error : 'El anÃ¡lisis no devolviÃ³ datos vÃ¡lidos.';
        if (resp && resp.correlationId) {
          errorMsg += ' (Ref: ' + resp.correlationId + ')';
        }
        showError(errorMsg);
      }
    })
    .catch(function (err) {
      progressBarInner.className = '';
      progressBar.style.display = 'none';
      var msg = err.message || err || 'Error al conectar con el servicio de IA.';
      if (msg.indexOf('rate') > -1 || msg.indexOf('lÃ­mite') > -1) {
        msg = 'LÃ­mite de uso alcanzado. Intenta de nuevo en unos minutos.';
      } else if (msg.indexOf('timeout') > -1 || msg.indexOf('tiempo') > -1) {
        msg = 'La solicitud tardÃ³ demasiado. Intenta de nuevo.';
      }
      var iaEl = document.getElementById('ia-results');
      iaEl.textContent = '';
      var errDiv = document.createElement('div');
      errDiv.className = 'error-banner show';
      errDiv.style.margin = '0';
      errDiv.textContent = msg;
      iaEl.appendChild(errDiv);
      iaEl.style.display = 'block';
      showToast(msg, 'error');
    })
    .then(function () {
      btnHeader.disabled = false;
      btnHeader.textContent = textoOriginalH;
      btnPanel.disabled = false;
      btnPanel.textContent = textoOriginalP;
    });
}

function exportarLibroDiarioCSV() {
  var btn = document.getElementById('btn-exportar-libro');
  var textoOriginal = btn.textContent;
  
  btn.disabled = true;
  btn.textContent = 'Exportando...';
  
  App.api.exportarLibroDiario()
    .then(function (resp) {
      btn.disabled = false;
      btn.textContent = textoOriginal;
      
      if (resp && resp.success) {
        var blob = new Blob([resp.csv], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'libro_diario_' + new Date().toISOString().slice(0,10) + '.csv';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Libro diario exportado correctamente', 'success');
      } else {
        showToast(resp.error || 'Error exportando libro diario', 'error');
      }
    })
    .catch(function (err) {
      btn.disabled = false;
      btn.textContent = textoOriginal;
      showToast(err.message || 'Error de conexiÃ³n', 'error');
    });
}

// State now in App.state — see app.html

function _renderLoadMore(nextToken) {
  var loadMoreRow = document.getElementById('row-cargar-mas');
  if (loadMoreRow) loadMoreRow.remove();
  var tr = document.createElement('tr');
  tr.id = 'row-cargar-mas';
  var td = document.createElement('td');
  td.colSpan = 5;
  td.style.textAlign = 'center';
  td.style.padding = 'var(--space-3)';
  var btn = document.createElement('button');
  btn.className = 'btn btn-outline btn-sm';
  btn.style.margin = '0 auto';
  btn.textContent = 'Cargar m\u00e1s';
  btn.addEventListener('click', function () {
    App.state.cartera.pageToken = nextToken;
    cargarCartera(true);
  });
  td.appendChild(btn);
  tr.appendChild(td);
  return tr;
}

function _showRetry(container, fn) {
  var btn = document.createElement('button');
  btn.className = 'btn btn-sm';
  btn.textContent = '\u21bb Reintentar';
  btn.style.marginLeft = 'var(--space-3)';
  btn.addEventListener('click', fn);
  container.querySelector('.error-banner').appendChild(btn);
}

function cargarCartera(append) {
  var view = document.getElementById('view-cartera');
  view.classList.add('is-loading');
  view.setAttribute('aria-busy', 'true');
  var tbody = document.querySelector('#view-cartera .data-table tbody');
  var tableSection = view.querySelector('.table-section');

  if (append !== true) {
    App.state.cartera.pageToken = 0;
    tbody.innerHTML = '';
    tableSection.classList.remove('scroll-hint');
    setTimeout(function() {
      if (tableSection.scrollWidth > tableSection.clientWidth) {
        tableSection.classList.add('scroll-hint');
      }
    }, 500);
  } else {
    var loadMoreRow = document.getElementById('row-cargar-mas');
    if (loadMoreRow) loadMoreRow.remove();
  }

  var filterTipoEl = document.getElementById('filter-tipo');
  var filterEstadoEl = document.getElementById('filter-estado');
  var filtroTipo = filterTipoEl.value || null;
  var filtroEstado = filterEstadoEl.value || null;

  return App.api.getCartera(filtroTipo, filtroEstado, App.state.cartera.pageSize, App.state.cartera.pageToken)
    .then(function (res) {
      if (append !== true) tbody.innerHTML = '';

      if (!res || (typeof res === 'object' && !res.items)) {
        var errorMsg = 'Respuesta vac\u00eda del servidor<br><span style="font-size:var(--text-micro);color:var(--muted);">';
        App.api.getCarteraDebug(filtroTipo, filtroEstado)
          .then(function (debug) {
            var diagMsg = '';
            if (res && res.permissionDenied) {
              diagMsg = 'Acceso denegado. Verifique que su usuario tenga rol asignado (VIEWER o superior).';
            } else if (debug.checks && debug.checks.sheetExists === false) {
              diagMsg = 'Error: Hoja "Cartera" no encontrada en el spreadsheet.';
            } else if (debug.checks && debug.checks.sheetLastRow < 2) {
              diagMsg = 'La hoja Cartera existe pero no tiene datos. Agregue registros a la cartera.';
            } else if (debug.checks && debug.checks.rawDataCount === 0) {
              diagMsg = 'No se pudieron leer datos de la hoja Cartera.';
            } else if (debug.checks && debug.checks.apiResult && debug.checks.apiResult.error) {
              diagMsg = 'Error en API: ' + debug.checks.apiResult.error;
            } else if (debug.errors && debug.errors.length > 0) {
              diagMsg = 'Errores detectados: ' + debug.errors.join(' | ');
            } else if (debug.checks && debug.checks.rawDataCount > 0 && (!debug.checks.apiResult || debug.checks.apiResult.itemsCount === 0)) {
              diagMsg = 'La hoja tiene ' + debug.checks.rawDataCount + ' filas, pero el filtro no coincide. Verifique los valores de los campos Tipo (debe ser CxC/CxP) y Estado.';
              if (debug.checks.tiposEnHoja) {
                diagMsg += '<br><br>Tipos encontrados en hoja: ' + JSON.stringify(debug.checks.tiposEnHoja);
              }
            } else {
              diagMsg = errorMsg;
            }
            mostrarError(tbody, diagMsg + '</span>');
          })
          .catch(function () {
            mostrarError(tbody, 'Respuesta vac\u00eda del servidor - diagn\u00f3stico fall\u00f3');
          });
        return;
      }
      
      if (res.error) {
        mostrarError(tbody, res.error);
        return;
      }

      var data = res.items || [];
      var nextToken = res.nextPageToken;

      if (!append && data.length === 0) {
        var td = document.createElement('td');
        td.colSpan = 5;
        mostrarVacio(td, 'No se encontraron registros con los filtros actuales');
        var tr = document.createElement('tr');
        tr.appendChild(td);
        tbody.appendChild(tr);
      } else {
        data.forEach(function (item) {
          var estadoInfo = App.mapearEstadoCartera(item.estado);
          var isVencida = item.estado === 'VENCIDA';
          var tr = document.createElement('tr');
          if (isVencida) tr.className = 'row-red';

          var tdFecha = document.createElement('td');
          tdFecha.className = 'td-mono td-muted';
          tdFecha.textContent = App.formatearFecha(item.fecha);
          tr.appendChild(tdFecha);

          var tdTercero = document.createElement('td');
          var nombreDiv = document.createElement('div');
          nombreDiv.className = 'td-bold';
          nombreDiv.textContent = item.nombre_tercero || '\u2014';
          var idTerceroDiv = document.createElement('div');
          idTerceroDiv.className = 'td-muted';
          idTerceroDiv.textContent = item.id_tercero || '';
          tdTercero.appendChild(nombreDiv);
          tdTercero.appendChild(idTerceroDiv);
          tr.appendChild(tdTercero);

          var tdSaldo = document.createElement('td');
          tdSaldo.className = 'td-mono td-bold';
          if (isVencida) tdSaldo.style.color = 'var(--red)';
          tdSaldo.textContent = App.formatearMoneda(item.saldo);
          tr.appendChild(tdSaldo);

          var tdEstado = document.createElement('td');
          var badgeSpan = document.createElement('span');
          badgeSpan.className = 'badge ' + estadoInfo.cls;
          badgeSpan.textContent = estadoInfo.label;
          tdEstado.appendChild(badgeSpan);
          tr.appendChild(tdEstado);

          var tdVenc = document.createElement('td');
          if (item.fecha_vencimiento) {
            if (isVencida && item.dias_vencido > 0) {
              var vencFechaDiv = document.createElement('div');
              vencFechaDiv.className = 'td-mono';
              vencFechaDiv.style.fontSize = 'var(--text-sm)';
              vencFechaDiv.textContent = App.formatearFecha(item.fecha_vencimiento);
              var vencDiasDiv = document.createElement('div');
              vencDiasDiv.className = 'td-muted';
              vencDiasDiv.style.color = 'var(--red)';
              vencDiasDiv.textContent = item.dias_vencido + ' d\u00ed' + (item.dias_vencido === 1 ? 'a' : 'as');
              tdVenc.appendChild(vencFechaDiv);
              tdVenc.appendChild(vencDiasDiv);
            } else {
              var vencSpan = document.createElement('span');
              vencSpan.className = 'td-mono';
              vencSpan.style.fontSize = 'var(--text-sm)';
              vencSpan.textContent = App.formatearFecha(item.fecha_vencimiento);
              tdVenc.appendChild(vencSpan);
            }
          } else {
            var vencDashSpan = document.createElement('span');
            vencDashSpan.className = 'td-mono';
            vencDashSpan.style.fontSize = 'var(--text-sm)';
            vencDashSpan.textContent = '\u2014';
            tdVenc.appendChild(vencDashSpan);
          }
          tr.appendChild(tdVenc);

          tbody.appendChild(tr);
        });

        if (nextToken != null) {
          tbody.appendChild(_renderLoadMore(nextToken));
        }
      }
    })
    .catch(function (err) {
      mostrarError(tbody, err.message || err);
      _showRetry(tbody, function () { cargarCartera(append); });
    })
    .then(function () {
      _cleanupView(view);
    });
}

function _announce(msg) {
  var el = document.getElementById('view-announcements');
  if (el) el.textContent = msg;
}

function _trapFocus(modal) {
  var focusables = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  var first = focusables[0];
  var last = focusables[focusables.length - 1];
  modal._first = first;
  modal._last = last;
  setTimeout(function() { if (modal._first) modal._first.focus(); }, 50);
  function trap(e) {
    if (e.key !== 'Tab') return;
    if (e.shiftKey && first && document.activeElement === first) {
      e.preventDefault();
      if (last) last.focus();
    } else if (!e.shiftKey && last && document.activeElement === last) {
      e.preventDefault();
      if (first) first.focus();
    }
  }
  modal.addEventListener('keydown', trap);
  modal._trap = trap;
  modal._opener = document.activeElement;
}

function _untrapFocus(modal) {
  if (modal._trap) modal.removeEventListener('keydown', modal._trap);
  if (modal._opener) modal._opener.focus();
  modal._trap = null;
  modal._opener = null;
}

function confirmarAccion(lineas, onConfirm) {
  var modal = document.getElementById('modal-confirm');
  var msgEl = document.getElementById('modal-confirm-msg');
  msgEl.textContent = '';
  lineas.forEach(function(l, i) {
    if (i > 0) msgEl.appendChild(document.createElement('br'));
    msgEl.appendChild(document.createTextNode(l));
  });
  document.getElementById('sidebar').setAttribute('aria-hidden', 'true');
  document.getElementById('main').setAttribute('aria-hidden', 'true');
  modal.classList.add('active');
  _trapFocus(modal);
  _announce('ConfirmaciÃ³n requerida');
  var btnOk = document.getElementById('modal-confirm-ok');
  var btnCan = document.getElementById('modal-confirm-cancel');
  function cleanup() {
    modal.classList.remove('active');
    _untrapFocus(modal);
    document.getElementById('sidebar').removeAttribute('aria-hidden');
    document.getElementById('main').removeAttribute('aria-hidden');
    btnOk.removeEventListener('click', onOk);
    btnCan.removeEventListener('click', onCancel);
    modal.removeEventListener('click', onOverlayClick);
    modal.removeEventListener('keydown', onEscape);
    _announce('ConfirmaciÃ³n cerrada');
  }
  function onOk() { cleanup(); onConfirm(); }
  function onCancel() { cleanup(); }
  function onEscape(e) { if (e.key === 'Escape') onCancel(); }
  function onOverlayClick(e) { if (e.target === modal) onCancel(); }
  function onKeydown(e) {
    if (e.key === 'Enter') onOk();
    else if (e.key === 'Escape') onCancel();
  }
  btnOk.addEventListener('click', onOk);
  btnCan.addEventListener('click', onCancel);
  modal.addEventListener('click', onOverlayClick);
  modal.addEventListener('keydown', onKeydown);
}

function guardarTercero() {
  var btnGuardar = document.getElementById('btn-tercero-guardar');
  var errorEl = document.getElementById('tercero-error');
  var nit = document.getElementById('tercero-nit').value.trim().toUpperCase();
  var nombre = document.getElementById('tercero-nombre').value.trim();
  var tipo = document.getElementById('tercero-tipo').value;
  var limiteRaw = document.getElementById('tercero-limite').value;
  var telefono = document.getElementById('tercero-telefono').value.trim();
  var activo = document.getElementById('tercero-activo').checked;

  if (!nit) {
    errorEl.textContent = 'El NIT / identificaciÃ³n es obligatorio.';
    errorEl.style.display = 'block';
    return;
  }
  if (nit.replace(/[^A-Z0-9]/g, '').length < 3) {
    errorEl.textContent = 'NIT invÃ¡lido. Debe contener al menos 3 caracteres alfanumÃ©ricos (sin puntos ni guiones).';
    errorEl.style.display = 'block';
    return;
  }
  if (!nombre) {
    errorEl.textContent = 'El nombre es obligatorio.';
    errorEl.style.display = 'block';
    return;
  }
  if (limiteRaw && limiteRaw.indexOf('.') !== -1) {
    errorEl.textContent = 'El lÃ­mite de crÃ©dito no debe contener decimales. Use valores enteros.';
    errorEl.style.display = 'block';
    return;
  }
  var limite = App.toCents(limiteRaw);
  errorEl.style.display = 'none';
  btnGuardar.disabled = true;
  btnGuardar.textContent = 'Guardando...';

  App.api.saveTercero({
    id: nit,
    nombre: nombre,
    tipo: tipo,
    limite_credito: limite,
    telefono: telefono,
    activo: activo
  }).then(function (r) {
    btnGuardar.disabled = false;
    btnGuardar.textContent = 'Guardar';
    if (r && r.success === false) {
      errorEl.textContent = r.message || 'Error al guardar tercero.';
      errorEl.style.display = 'block';
    } else {
      cerrarModalTercero();
      cargarTerceros();
    }
  }).catch(function (err) {
    btnGuardar.disabled = false;
    btnGuardar.textContent = 'Guardar';
    errorEl.textContent = err.message || err || 'Error al guardar tercero.';
    errorEl.style.display = 'block';
  });
}

function agregarFilaProducto() {
  var container = document.getElementById('venta-productos');
  var template = document.getElementById('row-template');
  var fragment = template.content.cloneNode(true);
  container.appendChild(fragment);
  var row = container.lastElementChild;
  var selects = row.querySelectorAll('.venta-producto-select, .venta-cantidad, .venta-precio');
  selects.forEach(function (el) {
    if (el.tagName === 'SELECT') el.value = '';
    else if (el.classList.contains('venta-cantidad')) el.value = '1';
    else if (el.classList.contains('venta-precio')) el.value = '0';
  });
  llenarSelectProductos(row.querySelector('.venta-producto-select'));
  row.querySelector('.venta-producto-select').addEventListener('change', function () {
    var opt = this.options[this.selectedIndex];
    var precioInput = this.closest('.venta-producto-row').querySelector('.venta-precio');
    if (opt && opt.dataset.precio) {
      precioInput.value = opt.dataset.precio;
    }
    calcularTotalVenta();
  });
  row.querySelector('.venta-cantidad').addEventListener('input', calcularTotalVenta);
  row.querySelector('.venta-precio').addEventListener('input', calcularTotalVenta);
  row.querySelector('.btn-remove-producto').addEventListener('click', function () {
    if (container.querySelectorAll('.venta-producto-row').length > 1) {
      row.remove();
      calcularTotalVenta();
    }
  });
  calcularTotalVenta();
}

function calcularTotalVenta() {
  var total = 0;
  document.querySelectorAll('.venta-producto-row').forEach(function (row) {
    var cant = parseInt(row.querySelector('.venta-cantidad').value, 10) || 0;
    var precio = parseFloat(row.querySelector('.venta-precio').value) || 0;
    total += cant * precio;
  });
  document.getElementById('venta-total').textContent = App.formatearMoneda(total * 100);
}

function registrarVenta() {
  var btn = document.getElementById('btn-registrar-venta');
  var errorEl = document.getElementById('venta-error');
  var successEl = document.getElementById('venta-success');
  errorEl.classList.remove('show');
  errorEl.textContent = '';
  successEl.style.display = 'none';

  var tipo = document.getElementById('venta-tipo').value;
  var idTercero = document.getElementById('venta-cliente').value;
  var diasCredito = parseInt(document.getElementById('venta-dias').value, 10) || 30;

  var carrito = [];
  var precioError = false;
  document.querySelectorAll('.venta-producto-row').forEach(function (row) {
    var id = row.querySelector('.venta-producto-select').value;
    var cantidad = parseInt(row.querySelector('.venta-cantidad').value, 10) || 0;
    var precioRaw = row.querySelector('.venta-precio').value;
    if (precioRaw && precioRaw.indexOf('.') !== -1) {
      precioError = true;
      return;
    }
    var precio = App.toCents(precioRaw);
    if (id && cantidad > 0) {
      carrito.push({ id: id, cantidad: cantidad, precio: precio });
    }
  });

  if (precioError) {
    errorEl.textContent = 'Los precios no deben contener decimales. Ingrese valores enteros.';
    errorEl.classList.add('show');
    return;
  }

  if (carrito.length === 0) {
    errorEl.textContent = 'Agregue al menos un producto al carrito.';
    errorEl.classList.add('show');
    return;
  }

  if (tipo === 'CxC' && !idTercero) {
    errorEl.textContent = 'Seleccione un cliente para ventas a crÃ©dito.';
    errorEl.classList.add('show');
    return;
  }

  if (tipo === 'CxC' && idTercero) {
    var totalVentaCentavos = 0;
    for (var iC = 0; iC < carrito.length; iC++) {
      totalVentaCentavos += carrito[iC].cantidad * carrito[iC].precio;
    }
    var cliente = null;
    var itemsT = App.data.terceros && App.data.terceros.items ? App.data.terceros.items : [];
    for (var iT = 0; iT < itemsT.length; iT++) {
      if (itemsT[iT].id === idTercero) { cliente = itemsT[iT]; break; }
    }
    // === FIX: Validar crÃ©dito disponible (lÃ­mite - saldo actual) ===
    if (cliente && cliente.limite_credito > 0) {
      var saldoActual = 0;
      var carteraItems = App.data.cartera && App.data.cartera.items ? App.data.cartera.items : [];
      for (var iCa = 0; iCa < carteraItems.length; iCa++) {
        var itemC = carteraItems[iCa];
        if (itemC.id_tercero === idTercero && itemC.estado !== 'CANCELADA') {
          saldoActual += itemC.saldo || 0;
        }
      }
      var creditoDisponible = cliente.limite_credito - saldoActual;
      if (totalVentaCentavos > creditoDisponible) {
        errorEl.textContent = 'La venta (' + App.formatearMoneda(totalVentaCentavos) + ') excede el crÃ©dito disponible del cliente (' + App.formatearMoneda(creditoDisponible) + '). Saldo actual: ' + App.formatearMoneda(saldoActual) + ', LÃ­mite: ' + App.formatearMoneda(cliente.limite_credito) + '.';
        errorEl.classList.add('show');
        return;
      }
    }
    // === FIN FIX ===
  }

  var totalStr = document.getElementById('venta-total').textContent;
  confirmarAccion(['Â¿Confirmar el registro de esta venta?', 'Total: ' + totalStr, 'Tipo: ' + tipo], function() {
  btn.disabled = true;
  btn.classList.add('is-processing');
  btn.textContent = 'â†’ Procesando...';

  App.api.procesarVenta(carrito, { tipo: tipo, idTercero: idTercero || null, diasCredito: diasCredito })
    .then(function (r) {
      btn.disabled = false;
      btn.classList.remove('is-processing');
      btn.textContent = 'â†’ Registrar venta';
      if (r && r.success === false) {
        errorEl.textContent = r.message || 'Error al registrar venta.';
        errorEl.classList.add('show');
      } else {
        successEl.textContent = 'Venta registrada exitosamente. Total: ' + App.formatearMoneda(r.total) + ' | Tipo: ' + (r.tipo === 'CxC' ? 'CrÃ©dito' : 'Contado');
        successEl.style.display = 'block';
        setTimeout(function(){ successEl.style.display = 'none'; }, 4000);
        var container = document.getElementById('venta-productos');
        container.innerHTML = '';
        agregarFilaProducto();
        calcularTotalVenta();
        document.getElementById('venta-cliente').value = '';
        App.data.invalidate();
        cargarDashboard();
        cargarCartera();
      }
    })
    .catch(function (err) {
      btn.disabled = false;
      btn.classList.remove('is-processing');
      btn.textContent = 'â†’ Registrar venta';
      errorEl.textContent = err.message || err || 'Error al registrar venta.';
      errorEl.classList.add('show');
    });
  });
}

function cargarProductos() {
  var body = document.getElementById('productos-body');
  if (!body) return;
  body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:var(--space-8) var(--space-4);color:var(--muted);font-size:var(--text-sm);">Cargando productos...</td></tr>';

  var busqueda = document.getElementById('productos-search') ? document.getElementById('productos-search').value.trim() : '';
  var categoria = document.getElementById('productos-filter-categoria') ? document.getElementById('productos-filter-categoria').value : '';

  var filtros = {};
  if (busqueda) filtros.busqueda = busqueda;
  if (categoria) filtros.categoria = categoria;

  return App.api.getProductos().then(function (resFull) {
    var allItems = (resFull && resFull.productos) || [];
    App.state.productos.cache = allItems;
    // Poblar combo de categorÃ­as
    var catSelect = document.getElementById('productos-filter-categoria');
    if (catSelect) {
      var cats = {};
      allItems.forEach(function (p) {
        if (p.categoria) cats[p.categoria] = true;
      });
      var sortedCats = Object.keys(cats).sort();
      catSelect.innerHTML = '<option value="">Todas las categorÃ­as</option>';
      sortedCats.forEach(function (c) {
        var opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        if (c === categoria) opt.selected = true;
        catSelect.appendChild(opt);
      });
    }
    // Filtrar localmente (o pedir al server si hay filtros)
    var items = allItems;
    if (filtros.busqueda || filtros.categoria) {
      items = allItems.filter(function (p) {
        if (filtros.categoria && p.categoria !== filtros.categoria) return false;
        if (filtros.busqueda) {
          var q = filtros.busqueda.toLowerCase();
          if (p.nombre.toLowerCase().indexOf(q) === -1 && p.id.toLowerCase().indexOf(q) === -1) return false;
        }
        return true;
      });
    }
    body.innerHTML = '';
    if (items.length === 0) {
      body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:var(--space-8) var(--space-4);color:var(--muted);font-size:var(--text-sm);">Sin productos registrados</td></tr>';
      return;
    }
    items.forEach(function (p) {
      var tr = document.createElement('tr');
      var activo = p.activo === 'ACTIVO';
      if (!activo) tr.className = 'row-red';
      var estadoBadge = activo
        ? '<span class="badge badge-ok" style="font-size:var(--text-micro);">Activo</span>'
        : '<span class="badge badge-red" style="font-size:var(--text-micro);">Inactivo</span>';
      var htmlStr =
        '<td style="font-family:var(--mono);font-size:var(--text-sm);">' + escapeHtml(p.id) + '</td>' +
        '<td>' + escapeHtml(p.nombre) + '</td>' +
        '<td>' + escapeHtml(p.categoria || 'â€”') + '</td>' +
        '<td class="cell-mono">' + (p.stock || 0) + '</td>' +
        '<td class="cell-mono">' + App.formatearMoneda(p.precio_compra) + '</td>' +
        '<td class="cell-mono">' + App.formatearMoneda(p.precio_venta) + '</td>' +
        '<td>' + estadoBadge + '</td>' +
        '<td style="display:flex;gap:var(--space-1);">' +
          '<button class="btn btn-sm btn-outline btn-editar-producto" data-id="' + escapeAttr(p.id) + '" style="font-size:var(--text-micro);min-height:auto;padding:var(--space-1) var(--space-2);">Editar</button>' +
          '<button class="btn btn-sm ' + (activo ? 'btn-outline' : 'btn-accent') + ' btn-toggle-producto" data-id="' + escapeAttr(p.id) + '" data-activo="' + (activo ? 'true' : 'false') + '" style="font-size:var(--text-micro);min-height:auto;padding:var(--space-1) var(--space-2);">' + (activo ? 'Desactivar' : 'Activar') + '</button>' +
        '</td>';
      tr.innerHTML = typeof DOMPurify !== 'undefined' && DOMPurify.sanitize
        ? DOMPurify.sanitize(htmlStr, {ALLOWED_TAGS: ['td', 'tr', 'button', 'span', 'div'], ALLOWED_ATTR: ['class', 'style', 'colspan', 'data-id', 'data-activo']})
        : htmlStr;
      body.appendChild(tr);
    });
  }).catch(function (err) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:var(--space-8) var(--space-4);color:var(--red);font-size:var(--text-sm);">' + escapeHtml(err.message || 'Error al cargar productos') + '</td></tr>';
  });
}

function guardarProducto() {
  var btn = document.getElementById('btn-producto-guardar');
  var errorEl = document.getElementById('producto-error');
  var id = document.getElementById('producto-id').value;
  var nombre = document.getElementById('producto-nombre').value.trim();
  var categoria = document.getElementById('producto-categoria').value.trim();
  var stock = parseInt(document.getElementById('producto-stock').value, 10) || 0;
  var precioCompra = parseInt(document.getElementById('producto-precio-compra').value, 10) || 0;
  var precioVenta = parseInt(document.getElementById('producto-precio-venta').value, 10) || 0;

  if (!nombre) { errorEl.textContent = 'El nombre es obligatorio.'; errorEl.style.display = 'block'; return; }
  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  var promise;
  if (id) {
    promise = App.api.actualizarProducto(id, {
      nombre: nombre,
      categoria: categoria,
      precio_compra: App.toCents(precioCompra),
      precio_venta: App.toCents(precioVenta)
    });
  } else {
    promise = App.api.crearProducto(nombre, App.toCents(precioCompra), App.toCents(precioVenta), categoria);
  }

  return promise.then(function (res) {
    btn.disabled = false;
    btn.textContent = 'Guardar';
    if (res && res.success === false) {
      errorEl.textContent = res.error || 'Error al guardar producto.';
      errorEl.style.display = 'block';
      return;
    }
    cerrarModalProducto();
    cargarProductos();
    App.api.getProductos().then(function (data) {
      App.state.productos.cache = (data && data.productos) || data || [];
      // Refrescar selects de compra si el modal estÃ¡ abierto
      document.querySelectorAll('.compra-producto-select').forEach(function (s) {
        llenarSelectProductos(s, true);
      });
    });
    showToast(id ? 'Producto actualizado' : 'Producto creado', 'success');
  }).catch(function (err) {
    btn.disabled = false;
    btn.textContent = 'Guardar';
    errorEl.textContent = err.message || err || 'Error al guardar producto.';
    errorEl.style.display = 'block';
  });
}

}

function guardarCompra() {
  var proveedorId = document.getElementById('compra-proveedor').value;
  var factura = document.getElementById('compra-factura').value.trim();
  var vencimiento = document.getElementById('compra-vencimiento').value;
  var errEl = document.getElementById('compra-error');

  if (!proveedorId) { errEl.textContent = 'Seleccione un proveedor'; errEl.style.display = 'block'; return; }

  var items = [];
  var totalDesdeItems = 0;
  document.querySelectorAll('.compra-item-row').forEach(function (row) {
    var select = row.querySelector('.compra-producto-select');
    var inputNuevo = row.querySelector('.compra-producto-nuevo');
    var cant = parseInt(row.querySelector('.compra-cantidad').value, 10) || 0;
    var prec = parseInt(row.querySelector('.compra-precio').value, 10) || 0;
    if (!cant || !prec) return;
    if (select.value && select.value !== '__NUEVO__') {
      items.push({ id: select.value, cantidad: cant, precio_unitario: prec });
    } else if (inputNuevo && inputNuevo.value.trim()) {
      items.push({ nombre: inputNuevo.value.trim(), cantidad: cant, precio_unitario: prec });
    }
    totalDesdeItems += cant * prec;
  });

  if (items.length === 0) { errEl.textContent = 'Agregue al menos un item vÃ¡lido (producto + cantidad + precio).'; errEl.style.display = 'block'; return; }

  var total = parseInt(document.getElementById('compra-total').value, 10) || totalDesdeItems;
  if (total < 1) { errEl.textContent = 'El total debe ser mayor a 0.'; errEl.style.display = 'block'; return; }

  errEl.style.display = 'none';
  var btn = document.getElementById('btn-compra-guardar');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  App.api.registrarCompra(proveedorId, items, total, vencimiento || null, factura || null).then(function (res) {
    btn.disabled = false;
    btn.textContent = 'Guardar compra';
    if (res && res.success === false) {
      errEl.textContent = res.error || 'Error al registrar compra';
      errEl.style.display = 'block';
      return;
    }
    document.getElementById('compra-success').textContent = 'Compra registrada exitosamente';
    document.getElementById('compra-success').style.display = 'block';
    // Refrescar cache de productos despuÃ©s de compra (posibles creaciones inline)
    App.api.getProductos().then(function (data) {
      App.state.productos.cache = (data && data.productos) || data || [];
    });
    setTimeout(cerrarModalNuevaCompra, 1500);
    cargarCompras();
  }).catch(function (err) {
    btn.disabled = false;
    btn.textContent = 'Guardar compra';
    errEl.textContent = err.message || err;
    errEl.style.display = 'block';
  });
}

// State now in App.state — see app.html

function abrirModalPagoCompra(idCompra, saldo) {
  var modal = document.getElementById('modal-pago-compra');
  App.state.pagos.compraId = idCompra;
  document.getElementById('pago-compra-title').textContent = 'Pagar compra #' + idCompra;
  document.getElementById('pago-compra-monto').value = Math.round(parseInt(saldo) / 100) || '';
  document.getElementById('pago-compra-ref').value = '';
  document.getElementById('pago-compra-error').style.display = 'none';
  document.getElementById('sidebar').setAttribute('aria-hidden', 'true');
  document.getElementById('main').setAttribute('aria-hidden', 'true');
  modal.classList.add('active');
  _trapFocus(modal);
  _announce('Modal pago de compra abierto');
}

function cerrarModalPagoCompra() {
  var modal = document.getElementById('modal-pago-compra');
  modal.classList.remove('active');
  _untrapFocus(modal);
  document.getElementById('sidebar').removeAttribute('aria-hidden');
  document.getElementById('main').removeAttribute('aria-hidden');
  App.state.pagos.compraId = null;
  _announce('Modal pago cerrado');
}

function ejecutarPagoCompra() {
  var montoInput = document.getElementById('pago-compra-monto').value;
  var montoCentavos = App.toCents(montoInput);
  var ref = document.getElementById('pago-compra-ref').value.trim();
  var errEl = document.getElementById('pago-compra-error');

  if (!montoCentavos || montoCentavos < 100) { errEl.textContent = 'Ingrese un monto vÃ¡lido (mÃ­nimo $1).'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  var btn = document.getElementById('btn-pago-compra-ejecutar');
  btn.disabled = true;
  btn.textContent = 'Procesando...';

  App.api.registrarPagoProveedor(App.state.pagos.compraId, montoCentavos, ref || 'Pago manual').then(function (res) {
    btn.disabled = false;
    btn.textContent = 'Pagar';
    if (res && res.success === false) {
      errEl.textContent = res.error || 'Error al procesar pago';
      errEl.style.display = 'block';
      return;
    }
    cerrarModalPagoCompra();
    showToast('Pago registrado exitosamente', 'success');
    cargarCompras();
  }).catch(function (err) {
    btn.disabled = false;
    btn.textContent = 'Pagar';
    errEl.textContent = err.message || err;
    errEl.style.display = 'block';
  });
}

function cargarVencimientos() {
  var body = document.getElementById('venc-body');
  if (!body) return;

  body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:var(--space-8) var(--space-4);color:var(--muted);font-size:var(--text-sm);">Cargando vencimientos...</td></tr>';

  var dias = parseInt(document.getElementById('venc-dias').value || '30', 10);

  return App.api.getProximosVencimientos(dias).then(function (res) {
    if (!res || res.success === false) {
      mostrarError(body, (res && res.error) || 'Error al cargar vencimientos');
      return;
    }
    var items = res.items || [];
    document.getElementById('venc-total').textContent = App.formatearMoneda(res.total || 0);

    body.innerHTML = '';
    if (items.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:var(--space-8) var(--space-4);color:var(--muted);font-size:var(--text-sm);">Sin vencimientos prÃ³ximos</td></tr>';
      return;
    }

    items.forEach(function (v) {
      var tr = document.createElement('tr');
      var tipo = v.tipo || v.origen || 'CxC';
      var labelTipo = tipo === 'CxP' ? 'Cuenta por pagar' : tipo === 'compra' ? 'Compra' : 'Cuenta por cobrar';
      var vencHtml =
        '<td><span class="badge badge-' + (tipo === 'CxP' || tipo === 'compra' ? 'yellow' : 'red') + '" style="font-size:var(--text-micro);">' + escapeHtml(labelTipo) + '</span></td>' +
        '<td>' + escapeHtml(v.nombre_tercero || v.nombre || 'â€”') + '</td>' +
        '<td class="cell-mono">' + App.formatearMoneda(v.saldo) + '</td>' +
        '<td>' + escapeHtml(String(v.dias_para_vencer || 0)) + ' d' + '</td>' +
        '<td style="font-size:var(--text-sm);">' + (v.fecha_vencimiento ? new Date(v.fecha_vencimiento).toLocaleDateString('es-CO') : 'â€”') + '</td>';
      tr.innerHTML = typeof DOMPurify !== 'undefined' && DOMPurify.sanitize
        ? DOMPurify.sanitize(vencHtml, {ALLOWED_TAGS: ['td', 'tr', 'span', 'div'], ALLOWED_ATTR: ['class', 'style', 'colspan']})
        : vencHtml;
      body.appendChild(tr);
    });
  }).catch(function (err) {
    mostrarError(body, err.message || err);
  });
}
