<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>MicroERP - Cartera Pro</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #a3b1c6;
      --primary-dark: #64748b;
      --secondary: #e2e8f0;
      --bg-dark: #0d1117;
      --bg-card: rgba(28, 33, 40, 0.85);
      --glass-border: rgba(163, 177, 198, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-gradient: linear-gradient(135deg, #e2e8f0 0%, #64748b 100%);
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(at 0% 0%, rgba(163, 177, 198, 0.05) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* Layout */
    #sidebar {
      width: 260px; height: 100vh; background: var(--bg-card); backdrop-filter: blur(16px);
      border-right: 1px solid var(--glass-border); padding: 2rem 1.5rem; position: sticky; top: 0;
      display: flex; flex-direction: column; z-index: 100;
    }

    #app-shell { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
    #main-content { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; }

    /* UI Elements */
    .brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 3rem; font-size: 1.5rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .nav-btn, .mobile-nav-btn { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }
    .nav-btn.active, .mobile-nav-btn.active { background: rgba(163, 177, 198, 0.1); border-color: rgba(163, 177, 198, 0.3); color: var(--secondary); }

    .card { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); margin-bottom: 1.5rem; }
    
    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-value { font-size: 1.8rem; font-weight: 800; margin: 0.5rem 0; }

    /* Tables */
    .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--glass-border); }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { background: rgba(13, 17, 23, 0.8); padding: 1rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; text-align: left; }
    td { padding: 1rem; border-top: 1px solid var(--glass-border); }

    /* Badges */
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge.abierta { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .badge.vencida { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    .badge.cancelada { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .badge.parcial { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

    /* Loader */
    #global-loader { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: var(--accent-gradient); z-index: 2000; transform: scaleX(0); transform-origin: left; transition: 0.3s; }
    #global-loader.loading { transform: scaleX(1); }

    /* Forms */
    input, select { width: 100%; background: rgba(13, 17, 23, 0.5); border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.8rem; color: #fff; margin-top: 0.4rem; outline: none; }
    .btn { width: 100%; padding: 1rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-primary { background: var(--accent-gradient); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: #fff; }

    /* Mobile */
    #bottom-nav { display: none; position: fixed; bottom: 1rem; left: 1rem; right: 1rem; height: 64px; background: rgba(28, 33, 40, 0.95); border-radius: 20px; border: 1px solid var(--glass-border); z-index: 1000; justify-content: space-around; align-items: center; }
    @media (max-width: 768px) { #sidebar { display: none; } #bottom-nav { display: flex; } .stats-grid { grid-template-columns: 1fr; } }
    .view { display: none; animation: fadeIn 0.3s ease; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="global-loader"></div>

  <aside id="sidebar">
    <div class="brand"><i data-lucide="layers"></i> MicroERP</div>
    <nav>
      <div class="nav-btn active" onclick="switchView(event, 'dashboard')"><i data-lucide="layout-dashboard"></i> Dashboard</div>
      <div class="nav-btn" onclick="switchView(event, 'terceros')"><i data-lucide="users"></i> Terceros</div>
      <div class="nav-btn" onclick="switchView(event, 'cartera')"><i data-lucide="wallet"></i> Cartera</div>
      <div class="nav-btn" onclick="switchView(event, 'abonos')"><i data-lucide="coins"></i> Nuevo Abono</div>
    </nav>
  </aside>

  <main id="app-shell">
    <div id="main-content">
      
      <section id="view-dashboard" class="view active">
        <h2 style="margin-bottom: 1.5rem;">Resumen Financiero</h2>
        <div class="stats-grid">
          <div class="card">
            <div style="color: var(--text-muted); font-size: 0.8rem;">POR COBRAR (CXC)</div>
            <div class="stat-value" id="dash-cxc">$0</div>
            <div class="text-danger" style="font-size: 0.85rem;">Vencido: <span id="dash-cxc-venc">$0</span></div>
          </div>
          <div class="card">
            <div style="color: var(--text-muted); font-size: 0.8rem;">POR PAGAR (CXP)</div>
            <div class="stat-value" id="dash-cxp">$0</div>
            <div class="text-warning" style="font-size: 0.85rem;">Vencido: <span id="dash-cxp-venc">$0</span></div>
          </div>
        </div>
        <div class="card">
          <button class="btn btn-primary" onclick="analizarIA()"><i data-lucide="sparkles"></i> Analizar Cartera con IA</button>
          <div id="ia-result" style="margin-top: 1rem; color: var(--secondary); display: none; font-size: 0.9rem; line-height: 1.4;"></div>
        </div>
      </section>

      <section id="view-terceros" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
          <h2>Terceros</h2>
          <button class="btn btn-primary" style="width:auto;" onclick="toggleModal('modal-tercero')"><i data-lucide="user-plus"></i></button>
        </div>
        <div class="card table-container">
          <table>
            <thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Límite</th><th>Acciones</th></tr></thead>
            <tbody id="tabla-terceros"></tbody>
          </table>
        </div>
      </section>

      <section id="view-cartera" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
          <h2>Movimientos</h2>
          <select id="filtro-cartera" style="width:auto; margin:0;" onchange="loadCartera()">
            <option value="">Todos</option><option value="CxC">CxC</option><option value="CxP">CxP</option>
          </select>
        </div>
        <div class="card table-container">
          <table>
            <thead><tr><th>Fecha</th><th>Tercero</th><th>Saldo</th><th>Estado</th><th>Vencimiento</th></tr></thead>
            <tbody id="tabla-cartera"></tbody>
          </table>
        </div>
      </section>

      <section id="view-abonos" class="view">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
          <h3 style="margin-bottom:1.5rem;">Registrar Pago (FIFO)</h3>
          <form id="form-abono" onsubmit="event.preventDefault(); registrarAbonoUI();">
            <div style="margin-bottom:1rem;"><label>Tercero</label><select id="abono-tercero" required></select></div>
            <div style="margin-bottom:1rem;"><label>Tipo</label><select id="abono-tipo"><option value="CxC">Cobro a Cliente</option><option value="CxP">Pago a Proveedor</option></select></div>
            <div style="margin-bottom:1rem;"><label>Monto</label><input type="number" id="abono-valor" required></div>
            <div style="margin-bottom:1.5rem;"><label>Referencia</label><input type="text" id="abono-ref" placeholder="Ej: Recibo 001"></div>
            <button type="submit" class="btn btn-primary">Ejecutar Movimiento</button>
          </form>
        </div>
      </section>

    </div>
  </main>

  <nav id="bottom-nav">
    <div class="mobile-nav-btn active" onclick="switchView(event, 'dashboard')"><i data-lucide="home"></i></div>
    <div class="mobile-nav-btn" onclick="switchView(event, 'terceros')"><i data-lucide="users"></i></div>
    <div class="mobile-nav-btn" onclick="switchView(event, 'cartera')"><i data-lucide="wallet"></i></div>
    <div class="mobile-nav-btn" onclick="switchView(event, 'abonos')"><i data-lucide="plus-circle"></i></div>
  </nav>

  <div id="modal-tercero" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center; padding:1rem;">
    <div class="card" style="width:100%; max-width:400px;">
      <h3>Nuevo Tercero</h3>
      <form id="form-tercero" onsubmit="event.preventDefault(); guardarTerceroUI();" style="margin-top:1rem;">
        <input type="text" id="t-id" placeholder="ID / NIT" required>
        <input type="text" id="t-nombre" placeholder="Nombre" required>
        <select id="t-tipo"><option value="CLIENTE">Cliente</option><option value="PROVEEDOR">Proveedor</option></select>
        <input type="number" id="t-limite" placeholder="Límite Crédito" value="0">
        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
          <button type="button" class="btn btn-outline" onclick="toggleModal('modal-tercero')">Cerrar</button>
          <button type="submit" class="btn btn-primary">Crear</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ═════════════════════════════════════════════════════════════════════════════════
    // FRONTEND AUDITED v2.0 — SECURITY + UX IMPROVED
    // ═════════════════════════════════════════════════════════════════════════════════
    
    lucide.createIcons();
    let isLoading = false;
    let TERCEROS_CACHE = [];  // Caché de terceros para lookups rápidos

    // ─ SEGURIDAD: Escape HTML (prevenir XSS) ─
    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
    }

    // ─ VALIDACIÓN: Solo números ─
    function isValidNumber(n) {
      const num = parseFloat(n);
      return !isNaN(num) && num > 0;
    }

    // ─ VALIDACIÓN: Tercero existe ─
    function terceroExists(id) {
      return TERCEROS_CACHE.some(t => t.id === id);
    }

    // ─ FORMAT: Moneda ─
    function formatCur(v) {
      const num = typeof v === 'number' ? v : (v / 100);  // Si es en centavos
      return new Intl.NumberFormat('es-CO', { 
        style: 'currency', 
        currency: 'COP', 
        maximumFractionDigits: 0 
      }).format(num);
    }

    // ─ LOADER ─
    function showLoader() { 
      if (isLoading) return; 
      isLoading = true; 
      document.getElementById('global-loader').classList.add('loading'); 
    }
    function hideLoader() { 
      isLoading = false; 
      document.getElementById('global-loader').classList.remove('loading'); 
    }

    // ─ UI: View switcher ─
    function switchView(e, viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      document.querySelectorAll('.nav-btn, .mobile-nav-btn').forEach(b => b.classList.remove('active'));
      if(e) e.currentTarget.classList.add('active');

      if(viewId === 'dashboard') loadDashboard();
      if(viewId === 'terceros') loadTerceros();
      if(viewId === 'cartera') loadCartera();
      if(viewId === 'abonos') loadSelectTerceros();
    }

    function toggleModal(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'flex' : 'none';
    }

    // ═════════════════════════════════════════════════════════════════════════════════
    // API CALLS — DASHBOARD
    // ═════════════════════════════════════════════════════════════════════════════════

    function loadDashboard() {
      showLoader();
      google.script.run
        .withSuccessHandler(data => {
          document.getElementById('dash-cxc').innerText = formatCur(data.porCobrar);
          document.getElementById('dash-cxc-venc').innerText = formatCur(data.vencidaCxC);
          document.getElementById('dash-cxp').innerText = formatCur(data.porPagar);
          document.getElementById('dash-cxp-venc').innerText = formatCur(data.vencidaCxP);
          
          // UX: Alerta si hay deuda vencida
          if (data.vencidaCxC > 0) {
            document.getElementById('dash-cxc-venc').style.color = 'var(--danger)';
            document.getElementById('dash-cxc-venc').style.fontWeight = '800';
          }
          
          hideLoader();
        })
        .withFailureHandler(err => { 
          hideLoader(); 
          alert("❌ Error Dashboard: " + escapeHTML(err.message)); 
        })
        .getDashboardCartera();
    }

    // ═════════════════════════════════════════════════════════════════════════════════
    // API CALLS — TERCEROS
    // ═════════════════════════════════════════════════════════════════════════════════

    function loadTerceros() {
      showLoader();
      google.script.run
        .withSuccessHandler(data => {
          TERCEROS_CACHE = data;  // Cache para validaciones
          let html = '';
          data.forEach(t => {
            html += `<tr>
              <td>${escapeHTML(t.id)}</td>
              <td>${escapeHTML(t.nombre)}</td>
              <td>${escapeHTML(t.tipo)}</td>
              <td>${formatCur(t.limite_credito)}</td>
              <td><button class="btn btn-outline" style="padding:4px 8px; font-size:10px; border-color:var(--danger);" onclick="eliminarTercero('${escapeHTML(t.id)}')">✕ Inactivo</button></td>
            </tr>`;
          });
          document.getElementById('tabla-terceros').innerHTML = html || '<tr><td colspan="5" style="text-align:center;">No hay terceros activos</td></tr>';
          hideLoader();
        })
        .withFailureHandler(err => { 
          hideLoader(); 
          alert("❌ Error Terceros: " + escapeHTML(err.message)); 
        })
        .getTerceros();
    }

    function guardarTerceroUI() {
      showLoader();
      const id = document.getElementById('t-id').value.trim();
      const nombre = document.getElementById('t-nombre').value.trim();
      const tipo = document.getElementById('t-tipo').value;
      const limite = document.getElementById('t-limite').value.trim();

      // VALIDACIÓN CLIENT-SIDE
      if (!id) { hideLoader(); alert("⚠️ Falta ID"); return; }
      if (!nombre) { hideLoader(); alert("⚠️ Falta Nombre"); return; }
      if (limit && !isValidNumber(limite)) { hideLoader(); alert("⚠️ Límite inválido"); return; }

      google.script.run
        .withSuccessHandler(res => {
          hideLoader();
          if(res.success) {
            alert("✅ Tercero guardado");
            document.getElementById('form-tercero').reset();
            toggleModal('modal-tercero');
            loadTerceros();
          } else {
            alert("❌ " + escapeHTML(res.message));
          }
        })
        .withFailureHandler(err => { 
          hideLoader(); 
          alert("❌ Error: " + escapeHTML(err.message)); 
        })
        .saveTercero({ id, nombre, tipo, limite_credito: parseFloat(limite) || 0 });
    }

    function eliminarTercero(id) {
      alert("⚠️ Función en construcción (soft-delete)");
    }

    // ═════════════════════════════════════════════════════════════════════════════════
    // API CALLS — CARTERA
    // ═════════════════════════════════════════════════════════════════════════════════

    function loadCartera() {
      showLoader();
      const filtro = document.getElementById('filtro-cartera').value || null;
      google.script.run
        .withSuccessHandler(data => {
          let html = '';
          data.forEach(c => {
            // UX: Colorear por estado + mostrar nombre tercero
            let badgeClass = c.estado.toLowerCase();
            let rowStyle = '';
            if (c.estado === 'VENCIDA') rowStyle = 'style="background:rgba(239,68,68,0.1);"';

            html += `<tr ${rowStyle}>
              <td>${c.fecha}</td>
              <td>
                <strong>${escapeHTML(c.nombre_tercero || c.id_tercero)}</strong><br>
                <small style="color:var(--text-muted);">${escapeHTML(c.id_tercero)}</small>
              </td>
              <td style="font-weight:600;">${formatCur(c.saldo)}</td>
              <td><span class="badge ${badgeClass}">${c.estado}</span></td>
              <td>${c.fecha_vencimiento}
                ${c.estado === 'VENCIDA' ? `<br><span style="color:var(--danger); font-size:0.8rem;">📅 ${c.dias_vencido} días</span>` : ''}
              </td>
            </tr>`;
          });
          document.getElementById('tabla-cartera').innerHTML = html || '<tr><td colspan="5" style="text-align:center;">Sin movimientos</td></tr>';
          hideLoader();
        })
        .withFailureHandler(err => { 
          hideLoader(); 
          alert("❌ Error Cartera: " + escapeHTML(err.message)); 
        })
        .getCartera(null, filtro);
    }

    // ═════════════════════════════════════════════════════════════════════════════════
    // API CALLS — ABONOS (Critical: validate before submit)
    // ═════════════════════════════════════════════════════════════════════════════════

    function loadSelectTerceros() {
      showLoader();
      google.script.run
        .withSuccessHandler(data => {
          TERCEROS_CACHE = data;
          const sel = document.getElementById('abono-tercero');
          sel.innerHTML = '<option value="">⚠️ Seleccione cliente...</option>';
          data.forEach(t => sel.innerHTML += `<option value="${t.id}">${escapeHTML(t.nombre)} (${t.tipo})</option>`);
          hideLoader();
        })
        .withFailureHandler(err => { 
          hideLoader(); 
        })
        .getTerceros();
    }

    function registrarAbonoUI() {
      showLoader();
      
      // VALIDACIÓN CLIENT ─ IMPORTANTE
      const tercero = document.getElementById('abono-tercero').value.trim();
      const valor = document.getElementById('abono-valor').value.trim();
      const ref = document.getElementById('abono-ref').value.trim();
      const tipo = document.getElementById('abono-tipo').value;

      if (!tercero) { hideLoader(); alert("⚠️ Seleccione un cliente"); return; }
      if (!terceroExists(tercero)) { hideLoader(); alert("⚠️ Cliente no encontrado"); return; }
      if (!isValidNumber(valor)) { hideLoader(); alert("⚠️ Monto debe ser > 0"); return; }
      if (!ref) { hideLoader(); alert("⚠️ Ingrese referencia (ej: Recibo 001)"); return; }

      google.script.run
        .withSuccessHandler(res => {
          hideLoader();
          if(res.success) {
            alert(`✅ Abono procesado: $${formatCur(res.aplicado)}`);
            document.getElementById('form-abono').reset();
            switchView(null, 'dashboard');
          } else {
            alert("❌ " + escapeHTML(res.message));
          }
        })
        .withFailureHandler(err => { 
          hideLoader(); 
          alert("❌ Error: " + escapeHTML(err.message)); 
        })
        .registrarAbono(tercero, parseFloat(valor), ref, tipo);
    }

    function analizarIA() {
      showLoader();
      const resDiv = document.getElementById('ia-result');
      resDiv.style.display = 'block';
      resDiv.innerText = "⏳ Gemini está analizando...";
      google.script.run
        .withSuccessHandler(res => { 
          hideLoader(); 
          if (res.success) {
            resDiv.innerText = res.analisis;
          } else {
            resDiv.innerText = "❌ " + escapeHTML(res.message);
          }
        })
        .withFailureHandler(err => { 
          hideLoader(); 
          resDiv.innerText = "❌ Error IA: " + escapeHTML(err.message); 
        })
        .analizarConGeminiCompleto();
    }

    // ═════════════════════════════════════════════════════════════════════════════════
    // LIFECYCLE
    // ═════════════════════════════════════════════════════════════════════════════════

    window.addEventListener('load', () => {
      loadSelectTerceros();  // Precarga caché de terceros
      loadDashboard();
    });
  </script>
</body>
</html>
